name: Update school data

on:
  schedule:
    - cron: '0 4 1 12 *'      # 每年 12 月 1 日 04:00 UTC
  workflow_dispatch: {}         # 也可在 Actions 页手动触发

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch grundskola data
        run: node fetch-data.mjs
      - name: Fetch gymnasium data
        run: node fetch-data-gy.mjs
      - name: Commit data if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json gy-data.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: refresh school data ($(date -u +%Y-%m-%d))"
            git push
          fi
