<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Gymnasiet</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  :root{--paper:#f6f5f1;--panel:#fff;--ink:#1b2230;--muted:#5d6675;--hair:#e5e3db;--hair2:#efeee8;--brand:#2f6f5e;--lo:#b14b3f;--mid:#e7c15e;--hi:#2f7d6b;--none:#c7c9c4;--shadow:0 1px 2px rgba(20,25,38,.06),0 8px 24px rgba(20,25,38,.06)}
  *{box-sizing:border-box}html,body{margin:0;height:100%}
  body{font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hanken Grotesk","Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased}
  .tnum{font-variant-numeric:tabular-nums}
  .app{display:flex;flex-direction:column;height:100%}
  header{padding:12px 16px;border-bottom:1px solid var(--hair);background:linear-gradient(180deg,#fbfaf7,#f6f5f1)}
  .topbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .level-nav{display:inline-flex;background:#e7e9e3;border-radius:10px;padding:3px;gap:2px}
  .level-nav a{text-decoration:none;color:var(--muted);font-size:13px;font-weight:600;padding:6px 12px;border-radius:8px}
  .level-nav a.on{background:var(--panel);color:var(--ink);box-shadow:var(--shadow)}
  .ttl{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{margin:0;font-size:18px;letter-spacing:.2px;font-weight:680}
  .sub{color:var(--muted);font-size:12.5px}
  .meta{margin-top:4px;color:var(--muted);font-size:12px}
  .sample-flag{display:none;margin-top:6px;font-size:12px;color:#8a5a1b;background:#fdf3df;border:1px solid #f0dcae;border-radius:8px;padding:5px 9px}
  .sample-flag.on{display:inline-block}.sample-flag code{background:#f3e6c4;padding:1px 4px;border-radius:4px}
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px}
  .seg{display:inline-flex;background:#ecebe4;border-radius:10px;padding:3px;gap:2px}
  .seg button{appearance:none;border:0;background:transparent;color:var(--muted);font:inherit;font-size:13px;font-weight:560;padding:7px 12px;border-radius:8px;cursor:pointer;white-space:nowrap;transition:background .15s,color .15s,box-shadow .15s}
  .seg button[aria-pressed="true"]{background:var(--panel);color:var(--ink);box-shadow:var(--shadow)}
  .seg button:focus-visible{outline:2px solid var(--brand);outline-offset:2px}
  .seg.lang button{padding:7px 10px}
  .spacer{flex:1 1 auto}
  select,.search input,.ms-btn{font:inherit;font-size:13px;color:var(--ink);background:var(--panel);border:1px solid var(--hair);border-radius:9px;padding:8px 10px;min-height:38px}
  .search{position:relative}.search input{padding-left:30px;width:160px;max-width:46vw}
  .search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);opacity:.5}
  .iconbtn{appearance:none;border:1px solid var(--hair);background:var(--panel);color:var(--muted);min-width:38px;min-height:38px;border-radius:9px;cursor:pointer;font-size:15px}
  .iconbtn:focus-visible{outline:2px solid var(--brand);outline-offset:2px}
  .ms{position:relative}
  .ms-btn{cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .ms-btn .badge{background:var(--brand);color:#fff;border-radius:999px;font-size:11px;padding:0 6px;min-width:18px;text-align:center}
  .ms-panel{position:absolute;z-index:1200;top:calc(100% + 6px);right:0;width:260px;max-height:340px;display:none;flex-direction:column;background:var(--panel);border:1px solid var(--hair);border-radius:11px;box-shadow:0 16px 40px rgba(0,0,0,.18)}
  .ms-panel.on{display:flex}
  .ms-panel .msf{padding:8px;border-bottom:1px solid var(--hair2);display:flex;gap:6px}
  .ms-panel .msf input{flex:1;font:inherit;font-size:13px;padding:6px 8px;border:1px solid var(--hair);border-radius:8px}
  .ms-list{overflow:auto;padding:4px}
  .ms-list label{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;font-size:13px;cursor:pointer}
  .ms-list label:hover{background:#f4f7f5}
  .ms-foot{display:flex;justify-content:space-between;padding:7px 10px;border-top:1px solid var(--hair2);font-size:12px}
  .ms-foot button{border:0;background:transparent;color:var(--brand);font:inherit;font-size:12px;cursor:pointer}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .chip{display:inline-flex;align-items:center;gap:6px;background:#eef2f0;border:1px solid #dde6e2;border-radius:999px;padding:3px 6px 3px 10px;font-size:12px}
  .chip button{border:0;background:transparent;cursor:pointer;color:var(--muted);font-size:14px;line-height:1;padding:0 2px}
  .main{flex:1 1 auto;display:flex;min-height:0}
  #map{flex:1 1 auto;min-width:0;background:#e9e7df}.leaflet-container{font:inherit}
  aside{width:392px;max-width:42vw;border-left:1px solid var(--hair);background:var(--panel);display:flex;flex-direction:column;min-height:0}
  .tabs{display:flex;gap:4px;padding:8px 12px 0}
  .tabs button{appearance:none;border:0;background:transparent;color:var(--muted);font:inherit;font-size:13px;font-weight:600;padding:7px 12px;border-radius:8px 8px 0 0;cursor:pointer;border-bottom:2px solid transparent}
  .tabs button[aria-selected="true"]{color:var(--ink);border-bottom-color:var(--brand)}
  .aside-head{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--hair2)}
  .aside-head b{font-size:13px;font-weight:640}.aside-head .n{color:var(--muted);font-size:12px}
  .legend{display:flex;flex-direction:column;gap:5px;padding:9px 14px;border-bottom:1px solid var(--hair2)}
  .bar{height:9px;border-radius:5px;background:linear-gradient(90deg,var(--lo),var(--mid),var(--hi))}
  .leglabs{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
  .help{font-size:11.5px;line-height:1.45;color:var(--muted);padding:8px 14px 10px;border-bottom:1px solid var(--hair2)}
  .tablewrap{overflow:auto;min-height:0}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{position:sticky;top:0;background:var(--panel);z-index:1;text-align:left;padding:9px 12px;border-bottom:1px solid var(--hair);color:var(--muted);font-weight:600;cursor:pointer;white-space:nowrap;user-select:none}
  thead th.numcol{text-align:right}thead th .ar{opacity:.4;font-size:10px;margin-left:3px}
  thead th[aria-sort] .ar{opacity:1;color:var(--ink)}
  tbody td{padding:9px 12px;border-bottom:1px solid var(--hair2);vertical-align:top}
  tbody td.numcol{text-align:right}tbody tr{cursor:pointer}
  tbody tr:hover{background:#f4f7f5}tbody tr.active{background:#e8f1ed;box-shadow:inset 3px 0 0 var(--brand)}
  .skola{font-weight:560}.kom{color:var(--muted);font-size:12px}
  .val{display:inline-flex;align-items:center;gap:7px;justify-content:flex-end}
  .dot{width:10px;height:10px;border-radius:50%;flex:none;box-shadow:0 0 0 1px rgba(0,0,0,.08) inset}
  .trend{padding:12px 14px;overflow:auto;min-height:0}
  .trend .thead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;flex-wrap:wrap}
  .trend .thead b{font-size:13px}
  .trend .seg button{font-size:12px;padding:5px 9px}
  .trend svg{width:100%;height:auto;display:block}
  .trend .tlegend{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;font-size:12px;color:var(--ink)}
  .trend .tlegend i{display:inline-block;width:14px;height:3px;border-radius:2px;margin-right:5px;vertical-align:middle}
  .trend .tnote{margin-top:8px;font-size:11.5px;color:var(--muted)}
  .pop b{display:block;font-size:14px;margin-bottom:2px}.pop .pk{color:var(--muted);font-size:12px;margin-bottom:8px}
  .pop table{font-size:12px;border-collapse:collapse;width:100%}
  .pop th,.pop td{padding:2px 6px;text-align:right;border-bottom:1px solid var(--hair2)}
  .pop th:first-child,.pop td:first-child{text-align:left}.pop thead th{color:var(--muted);font-weight:600;position:static}
  .pop tr.cur td{font-weight:680;color:var(--brand)}
  .empty{padding:26px 16px;color:var(--muted);font-size:13px;text-align:center}
  .backdrop{position:fixed;inset:0;background:rgba(20,25,38,.4);display:none;z-index:1000}.backdrop.on{display:block}
  .panel{position:fixed;z-index:1001;left:50%;top:50%;transform:translate(-50%,-50%);width:min(580px,92vw);max-height:82vh;overflow:auto;background:var(--panel);border:1px solid var(--hair);border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.28);padding:16px 18px;display:none}.panel.on{display:block}
  .panel h3{margin:0 0 4px;font-size:15px}.panel .lead{color:var(--muted);font-size:12px;margin-bottom:8px}
  .panel .cat{margin-top:14px;font-size:12px;font-weight:700;color:var(--brand)}
  .panel .pi{display:grid;grid-template-columns:auto 1fr;gap:3px 12px;font-size:12.5px;margin-top:5px}.panel .pi b{white-space:nowrap}
  .panel .x{position:absolute;top:10px;right:14px;border:0;background:transparent;font-size:20px;line-height:1;cursor:pointer;color:var(--muted)}
  @media (max-width:820px){.main{flex-direction:column}#map{height:46vh;flex:none}aside{width:auto;max-width:none;border-left:0;border-top:1px solid var(--hair);flex:1 1 auto}.search input{width:130px}.ms-panel{right:auto;left:0}}
  @media (prefers-reduced-motion:reduce){*{scroll-behavior:auto!important}}
</style>
</head>

const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const SEQ=[[177,75,63],[231,193,94],[47,125,107]];
function color(mk,v){if(v==null||isNaN(v))return getCSS('--none');const[lo,hi]=METRICS[mk].dom;let t=Math.max(0,Math.min(1,(v-lo)/(hi-lo)));const seg=t<.5?0:1,lt=t<.5?t/.5:(t-.5)/.5;const c=SEQ[seg].map((x,i)=>Math.round(x+(SEQ[seg+1][i]-x)*lt));return `rgb(${c[0]},${c[1]},${c[2]})`;}
const getCSS=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
function fmt(v,mk){if(v==null||isNaN(v))return '—';const M=METRICS[mk];return v.toFixed(M.dec)+M.unit;}

function schoolValue(s,mk){const f=METRICS[mk].field;
  if(state.program){const p=s.programs.find(x=>x.c===state.program);return p?(p[f]??null):null;}
  let w=0,sum=0;for(const p of s.programs){const v=p[f];if(v==null)continue;const ww=p.n||1;w+=ww;sum+=v*ww;}
  if(!w)return null;const avg=sum/w;return mk==='gpa'?+avg.toFixed(1):Math.round(avg);}
function schoolYearValue(s,mk,period){const sf=METRICS[mk].sf;
  if(state.program){const p=s.programs.find(x=>x.c===state.program);return p&&p[sf]?(p[sf][period]??null):null;}
  let w=0,sum=0;for(const p of s.programs){const v=p[sf]&&p[sf][period];if(v==null)continue;const ww=p.n||1;w+=ww;sum+=v*ww;}return w?sum/w:null;}
function offersProgram(s){return state.program?s.programs.some(p=>p.c===state.program):true;}

async function load(){
  let d=null;try{const r=await fetch('./gy-data.json',{cache:'no-store'});if(r.ok)d=await r.json();}catch(e){}
  if(!d||!d.schools||!d.schools.length)d=SAMPLE;
  DATA=d.schools;META=d;
  if(d.sample||(d.source&&/EXEMPEL/i.test(d.source)))$('#sampleFlag').classList.add('on');
  initMap();buildOptions();applyLang();render();
}
function initMap(){map=L.map('map',{preferCanvas:true}).setView([62,15],4);L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap, © CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);layer=L.layerGroup().addTo(map);}

let KOMS=[];
function buildOptions(){
  const codes=[...new Set(DATA.flatMap(s=>s.programs.map(p=>p.c)))].sort((a,b)=>a.localeCompare(b));
  const psel=$('#program');for(const c of codes){const o=document.createElement('option');o.value=c;o.dataset.code=c;psel.appendChild(o);}
  KOMS=[...new Set(DATA.map(s=>s.kommun).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'sv'));renderMsList('');
}
function renderMsList(filter){const f=filter.trim().toLowerCase(),list=$('#msList');list.innerHTML='';
  for(const k of KOMS){if(f&&!k.toLowerCase().includes(f))continue;
    const lab=document.createElement('label');lab.innerHTML=`<input type="checkbox" ${state.kommuner.includes(k)?'checked':''}><span>${esc(k)}</span>`;
    lab.querySelector('input').onchange=e=>{if(e.target.checked){if(!state.kommuner.includes(k))state.kommuner.push(k);}else state.kommuner=state.kommuner.filter(x=>x!==k);syncKommun();};
    list.appendChild(lab);}}
function syncKommun(){const b=$('#msBadge');b.hidden=state.kommuner.length===0;b.textContent=state.kommuner.length;
  const chips=$('#chips');chips.innerHTML='';
  state.kommuner.forEach(k=>{const c=document.createElement('span');c.className='chip';c.innerHTML=`${esc(k)} <button aria-label="remove">×</button>`;c.querySelector('button').onclick=()=>{state.kommuner=state.kommuner.filter(x=>x!==k);renderMsList($('#msSearch').value);syncKommun();};chips.appendChild(c);});
  render();const rows=filtered().filter(s=>s.lat&&s.lng);if(state.kommuner.length&&rows.length)map.fitBounds(L.latLngBounds(rows.map(s=>[s.lat,s.lng])).pad(.3));}

function applyLang(){const t=I18N[lang];document.documentElement.lang=lang;document.title=t.title;
  $('#navGr').textContent=t.navGr;$('#navGy').textContent=t.navGy;
  $('#h1').textContent=t.title;$('#subtitle').textContent=t.subtitle;$('#sampleFlag').innerHTML=t.sample;
  $$('#metricSeg [data-metric]').forEach(b=>{const[a,s]=t.metricShort[b.dataset.metric];b.innerHTML=`${a} <span class="sub">${s}</span>`;});
  $$('#huvudSeg [data-huvud]').forEach(b=>{b.textContent=b.dataset.huvud===''?t.all:(b.dataset.huvud==='Kommunal'?t.kommunal:t.fristaende);});
  $$('#langSeg [data-lang]').forEach(b=>b.setAttribute('aria-pressed',b.dataset.lang===lang));
  const psel=$('#program');psel.options[0].textContent=t.allProg;[...psel.options].slice(1).forEach(o=>{o.textContent=`${o.dataset.code} · ${progName(o.dataset.code,lang)}`;});
  $('#progInfoBtn').title=PANELT[lang].btn;
  $('#msBtnLabel').textContent=t.msLabel;$('#msSearch').placeholder=t.msSearchPh;$('#msClear').textContent=t.msClear;$('#msClose').textContent=t.msClose;
  $('#q').placeholder=t.searchPh;$('#shownUnit').textContent=t.unit;
  $('#thSchool').textContent=t.colSchool;$('#thKommun').textContent=t.colKommun;$('#thValue').textContent=t.colValue;$('#empty').textContent=t.empty;
  $('#tabRank').textContent=t.tabRank;$('#tabTrend').textContent=t.tabTrend;
  $('#rangeSeg [data-range]').forEach(b=>b.textContent=b.dataset.range==='all'?({zh:'全部',sv:'Alla',en:'All'}[lang]):b.dataset.range+(lang==='zh'?'年':lang==='sv'?' år':'y'));
  $('#meta').innerHTML=t.metaTpl(META.count||DATA.length,META.latestPeriod,(META.source||'').replace(/EXEMPEL.*/i,'sample'));
  const order=['prep','voc','intro'],groups={prep:[],voc:[],intro:[]};Object.keys(PROGINFO).forEach(c=>groups[PROGINFO[c].cat].push(c));
  let ph='<h3>'+PANELT[lang].t+'</h3><div class="lead">'+PANELT[lang].lead+'</div>';
  for(const cat of order){ph+='<div class="cat">'+CAT[lang][cat]+'</div><div class="pi">';for(const c of groups[cat])ph+='<b>'+c+' '+progName(c,lang)+'</b><span>'+PROGINFO[c][lang]+'</span>';ph+='</div>';}
  $('#progPanelBody').innerHTML=ph;
}

function filtered(){const q=state.q.trim().toLowerCase();
  return DATA.filter(s=>{if(state.huvud&&s.huvudman!==state.huvud)return false;if(state.kommuner.length&&!state.kommuner.includes(s.kommun))return false;if(!offersProgram(s))return false;if(q&&!(`${s.namn} ${s.kommun} ${s.ort||''}`.toLowerCase().includes(q)))return false;return true;});}
function sortRows(rows){const m=state.metric,key=state.sort;const valOf=s=>key==='metric'?schoolValue(s,m):s[key];const isStr=key==='namn'||key==='kommun';
  const arr=rows.slice().sort((a,b)=>{let x=valOf(a),y=valOf(b);const xn=(x==null||x===''),yn=(y==null||y==='');if(xn&&yn)return 0;if(xn)return 1;if(yn)return -1;return isStr?String(x).localeCompare(String(y),'sv'):x-y;});
  if(state.dir==='desc')arr.reverse();
  if(!isStr){const has=[],no=[];arr.forEach(s=>{(valOf(s)==null?no:has).push(s);});return [...has,...no];}return arr;}
function setLegend(){const M=METRICS[state.metric],t=I18N[lang];$('#legLo').textContent=M.dom[0]+M.unit;$('#legHi').textContent=M.dom[1]+M.unit;
  let lead;if(state.program){const info=progInfo(state.program),nm=progName(state.program,lang),cat=info?CAT[lang][info.cat]:'';lead='<b>'+state.program+' '+nm+'</b>'+(cat?' · '+cat:'')+(info?'：'+info[lang]:'');}else{lead=GPROG[lang].avg;}
  $('#metricHelp').innerHTML=lead+'<br><span style="opacity:.85">'+HELP[lang][state.metric]+'</span>';}

function render(){const m=state.metric,t=I18N[lang];
  $('#metricName').textContent=t.metricNames[m]+(state.program?` · ${state.program}`:'');setLegend();
  const rows=filtered();$('#shown').textContent=rows.length;
  layer.clearLayers();markers.clear();
  for(const s of rows.filter(s=>s.lat&&s.lng)){const v=schoolValue(s,m);const mk=L.circleMarker([s.lat,s.lng],{radius:6,color:'#fff',weight:1.1,fillColor:color(m,v),fillOpacity:.92}).bindPopup(popup(s),{maxWidth:300});mk.on('click',()=>setActive(s.kod,false));mk.addTo(layer);markers.set(s.kod,mk);}
  const sorted=sortRows(rows),rank=state.sort==='metric'&&state.dir==='desc';const tb=$('#tbody');tb.innerHTML='';
  sorted.forEach((s,i)=>{const v=schoolValue(s,m),tr=document.createElement('tr');tr.dataset.kod=s.kod;const tag=state.program?` · ${state.program}`:` · ${s.programs.length} ${lang==='zh'?'项目':lang==='sv'?'program':'progs'}`;
    tr.innerHTML=`<td><span class="skola">${rank?`<span class="kom">${i+1}.</span> `:''}${esc(s.namn)}</span><div class="kom">${s.huvudman?(t.huvudLabel[s.huvudman]||s.huvudman):''}${tag}</div></td><td class="kom">${esc(s.kommun||'—')}</td><td class="numcol"><span class="val tnum">${fmt(v,m)}<span class="dot" style="background:${color(m,v)}"></span></span></td>`;
    tr.addEventListener('click',()=>setActive(s.kod,true));tb.appendChild(tr);});
  $('#empty').hidden=sorted.length>0;if(active&&!markers.has(active))active=null;updateSortHeaders();
  if(state.tab==='trend')renderTrend();}
function popup(s){const t=I18N[lang].pop;const progs=s.programs.slice().sort((a,b)=>(b.a??-1)-(a.a??-1));let rows='';
  for(const p of progs){const cur=state.program&&p.c===state.program?' class="cur"':'';rows+=`<tr${cur}><td>${p.c} · ${progName(p.c,lang)}</td><td>${p.a??'—'}</td><td>${p.g!=null?p.g.toFixed(1):'—'}</td><td>${p.e!=null?p.e+'%':'—'}</td></tr>`;}
  return `<div class="pop"><b>${esc(s.namn)}</b><div class="pk">${esc(s.kommun||'')}${s.huvudman?' · '+(I18N[lang].huvudLabel[s.huvudman]||s.huvudman):''}${s.elever?' · '+I18N[lang].pupils(s.elever):''}</div><table><thead><tr><th>${t.prog}</th><th>${t.adm}</th><th>${t.gpa}</th><th>${t.exam}</th></tr></thead><tbody>${rows}</tbody></table><div class="kom" style="margin-top:6px">${t.schoolNote}</div></div>`;}
function setActive(kod,fly){active=kod;$$('#tbody tr').forEach(tr=>{const on=tr.dataset.kod===kod;tr.classList.toggle('active',on);if(on)tr.scrollIntoView({block:'nearest'});});const mk=markers.get(kod);if(mk){if(fly)map.flyTo(mk.getLatLng(),Math.max(map.getZoom(),9),{duration:.6});mk.openPopup();}if(state.tab==='trend')renderTrend();}
function updateSortHeaders(){$$('thead th').forEach(th=>{if(th.dataset.sort===state.sort){th.setAttribute('aria-sort',state.dir==='asc'?'ascending':'descending');th.querySelector('.ar').textContent=state.dir==='asc'?'▲':'▼';}else{th.removeAttribute('aria-sort');th.querySelector('.ar').textContent='▲▼';}});}

/* TREND (följer programval) */
function allPeriods(mk){const sf=METRICS[mk].sf,set=new Set();for(const s of DATA)for(const p of s.programs){if(state.program&&p.c!==state.program)continue;const ser=p[sf];if(ser)for(const k in ser)set.add(k);}return [...set].sort();}
function avgSeries(schools,mk){const o={};for(const p of allPeriods(mk)){let n=0,sum=0;for(const s of schools){const v=schoolYearValue(s,mk,p);if(v!=null){n++;sum+=v;}}if(n)o[p]=sum/n;}return o;}
function lastN(a,n){return a.slice(Math.max(0,a.length-n));}
function shortP(p){const a=p.split('/');return a.length===2?a[0].slice(2)+'/'+a[1]:p;}
function renderTrend(){const t=I18N[lang],mk=state.metric,M=METRICS[mk];
  const periodsAll=allPeriods(mk);const periods=state.range==='all'?periodsAll:lastN(periodsAll,state.range);const series=[];const as=active?DATA.find(s=>s.kod===active):null;
  const progCtx=state.program?state.program:t.trProgAll;let scope;
  if(as){scope=t.trTitleSchool;series.push({label:as.namn,color:'#1b2230',width:2.4,pts:periods.map(p=>({p,v:schoolYearValue(as,mk,p)}))});const ka=avgSeries(DATA.filter(s=>s.kommun===as.kommun),mk);series.push({label:as.kommun+t.trKommunSuffix,color:'#2f6f5e',pts:periods.map(p=>({p,v:ka[p]}))});}
  else if(state.kommuner.length){scope=t.trTitleKommun;state.kommuner.slice(0,6).forEach((k,i)=>{const a=avgSeries(DATA.filter(s=>s.kommun===k),mk);series.push({label:k,color:LINE_COLORS[i%6],pts:periods.map(p=>({p,v:a[p]}))});});}
  else scope=t.trTitleNational;
  const nat=avgSeries(DATA,mk);series.push({label:t.trNational,color:'#8a8f99',dash:true,pts:periods.map(p=>({p,v:nat[p]}))});
  $('#trendTitle').textContent=t.metricNames[mk].split(' (')[0]+' · '+scope+' · '+progCtx;
  drawTrend(periods,series,M);
  $('#trendLegend').innerHTML=series.map(s=>`<span><i style="background:${s.color}${s.dash?';opacity:.7':''}"></i>${esc(s.label)}</span>`).join('');
  const maxhint=TRMAX[lang](periodsAll.length);const hint=(!as&&!state.kommuner.length)?t.trHint:'';$('#trendNote').textContent=[maxhint,hint].filter(Boolean).join(' · ');}
function drawTrend(periods,series,M){const W=340,H=210,padL=36,padR=10,padT=12,padB=26;
  const xs=p=>padL+(periods.length<=1?0:(periods.indexOf(p)/(periods.length-1))*(W-padL-padR));
  let vals=[];series.forEach(s=>s.pts.forEach(pt=>{if(pt.v!=null)vals.push(pt.v);}));
  if(!vals.length){$('#trendChart').innerHTML=`<svg viewBox="0 0 ${W} ${H}"></svg>`;return;}
  let mn=Math.min(...vals),mx=Math.max(...vals);if(mn===mx){mn-=1;mx+=1;}const pv=(mx-mn)*.12;mn-=pv;mx+=pv;
  const ys=v=>padT+(1-(v-mn)/(mx-mn))*(H-padT-padB),dec=M.dec;let g='';
  [0,.5,1].forEach(f=>{const v=mn+(mx-mn)*f,y=ys(v);g+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#eceae3"/><text x="${padL-5}" y="${y+3}" text-anchor="end" font-size="9" fill="#9aa0ab">${v.toFixed(dec)}</text>`;});
  const step=periods.length>6?2:1;periods.forEach((p,i)=>{if(i%step===0||i===periods.length-1)g+=`<text x="${xs(p)}" y="${H-9}" text-anchor="middle" font-size="9" fill="#9aa0ab">${shortP(p)}</text>`;});
  for(const s of series){const segs=[];let cur=[];s.pts.forEach(pt=>{if(pt.v==null){if(cur.length)segs.push(cur);cur=[];}else cur.push(`${xs(pt.p).toFixed(1)},${ys(pt.v).toFixed(1)}`);});if(cur.length)segs.push(cur);
    segs.forEach(c=>{g+=`<polyline points="${c.join(' ')}" fill="none" stroke="${s.color}" stroke-width="${s.width||1.8}" ${s.dash?'stroke-dasharray="4 3" opacity=".8"':''} stroke-linejoin="round" stroke-linecap="round"/>`;});
    s.pts.forEach(pt=>{if(pt.v!=null)g+=`<circle cx="${xs(pt.p).toFixed(1)}" cy="${ys(pt.v).toFixed(1)}" r="${s.width?3:2.3}" fill="${s.color}"><title>${esc(s.label)} ${shortP(pt.p)}: ${pt.v.toFixed(dec)}</title></circle>`;});}
  $('#trendChart').innerHTML=`<svg viewBox="0 0 ${W} ${H}" role="img">${g}</svg>`;}
function setTab(tab){state.tab=tab;$('#tabRank').setAttribute('aria-selected',tab==='rank');$('#tabTrend').setAttribute('aria-selected',tab==='trend');$('#rankView').hidden=tab!=='rank';$('#trendView').hidden=tab!=='trend';if(tab==='trend')renderTrend();}

/* events */
$$('#metricSeg [data-metric]').forEach(b=>b.onclick=()=>{state.metric=b.dataset.metric;$$('#metricSeg [data-metric]').forEach(x=>x.setAttribute('aria-pressed',x===b));render();});
$$('#huvudSeg [data-huvud]').forEach(b=>b.onclick=()=>{state.huvud=b.dataset.huvud;$$('#huvudSeg [data-huvud]').forEach(x=>x.setAttribute('aria-pressed',x===b));render();});
$$('#langSeg [data-lang]').forEach(b=>b.onclick=()=>{lang=b.dataset.lang;try{localStorage.setItem('skolkarta_lang',lang);}catch(e){}applyLang();renderMsList($('#msSearch').value);syncKommun();});
$('#program').onchange=e=>{state.program=e.target.value;render();};
$('#progInfoBtn').onclick=()=>{$('#progBackdrop').classList.add('on');$('#progPanel').classList.add('on');};
function closePanel(){$('#progBackdrop').classList.remove('on');$('#progPanel').classList.remove('on');}
$('#progBackdrop').onclick=closePanel;$('#progPanelClose').onclick=closePanel;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});
$('#msBtn').onclick=()=>$('#msPanel').classList.toggle('on');
$('#msClose').onclick=()=>$('#msPanel').classList.remove('on');
$('#msClear').onclick=()=>{state.kommuner=[];renderMsList($('#msSearch').value);syncKommun();};
$('#msSearch').oninput=e=>renderMsList(e.target.value);
document.addEventListener('click',e=>{if(!$('#ms').contains(e.target))$('#msPanel').classList.remove('on');});
let qt;$('#q').oninput=e=>{clearTimeout(qt);qt=setTimeout(()=>{state.q=e.target.value;render();},120);};
$$('thead th').forEach(th=>th.onclick=()=>{const k=th.dataset.sort;if(state.sort===k)state.dir=state.dir==='asc'?'desc':'asc';else{state.sort=k;state.dir=(k==='namn'||k==='kommun')?'asc':'desc';}render();});
$('#tabRank').onclick=()=>setTab('rank');$('#tabTrend').onclick=()=>setTab('trend');
$$('#rangeSeg [data-range]').forEach(b=>b.onclick=()=>{state.range=b.dataset.range==='all'?'all':+b.dataset.range;$$('#rangeSeg [data-range]').forEach(x=>x.setAttribute('aria-pressed',x===b));renderTrend();});
load();
</script>
</body>
