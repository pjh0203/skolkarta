<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Gymnasiet</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  :root{--paper:#f6f5f1;--panel:#fff;--ink:#1b2230;--muted:#5d6675;--hair:#e5e3db;--hair2:#efeee8;--brand:#2f6f5e;--lo:#b14b3f;--mid:#e7c15e;--hi:#2f7d6b;--none:#c7c9c4;--shadow:0 1px 2px rgba(20,25,38,.06),0 8px 24px rgba(20,25,38,.06)}
  *{box-sizing:border-box}html,body{margin:0;height:100%}
  body{font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hanken Grotesk","Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased}
  .tnum{font-variant-numeric:tabular-nums}
  .app{display:flex;flex-direction:column;height:100%}
  header{padding:12px 16px;border-bottom:1px solid var(--hair);background:linear-gradient(180deg,#fbfaf7,#f6f5f1)}
  .topbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .level-nav{display:inline-flex;background:#e7e9e3;border-radius:10px;padding:3px;gap:2px}
  .level-nav a{text-decoration:none;color:var(--muted);font-size:13px;font-weight:600;padding:6px 12px;border-radius:8px}
  .level-nav a.on{background:var(--panel);color:var(--ink);box-shadow:var(--shadow)}
  .ttl{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  h1{margin:0;font-size:18px;letter-spacing:.2px;font-weight:680}
  .sub{color:var(--muted);font-size:12.5px}
  .meta{margin-top:4px;color:var(--muted);font-size:12px}
  .sample-flag{display:none;margin-top:6px;font-size:12px;color:#8a5a1b;background:#fdf3df;border:1px solid #f0dcae;border-radius:8px;padding:5px 9px}
  .sample-flag.on{display:inline-block}.sample-flag code{background:#f3e6c4;padding:1px 4px;border-radius:4px}
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px}
  .seg{display:inline-flex;background:#ecebe4;border-radius:10px;padding:3px;gap:2px}
  .seg button{appearance:none;border:0;background:transparent;color:var(--muted);font:inherit;font-size:13px;font-weight:560;padding:7px 12px;border-radius:8px;cursor:pointer;white-space:nowrap;transition:background .15s,color .15s,box-shadow .15s}
  .seg button[aria-pressed="true"]{background:var(--panel);color:var(--ink);box-shadow:var(--shadow)}
  .seg button:focus-visible{outline:2px solid var(--brand);outline-offset:2px}
  .seg.lang button{padding:7px 10px}
  .spacer{flex:1 1 auto}
  select,.search input{font:inherit;font-size:13px;color:var(--ink);background:var(--panel);border:1px solid var(--hair);border-radius:9px;padding:8px 10px;min-height:38px}
  .search{position:relative}.search input{padding-left:30px;width:180px;max-width:46vw}
  .search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);opacity:.5}
  .main{flex:1 1 auto;display:flex;min-height:0}
  #map{flex:1 1 auto;min-width:0;background:#e9e7df}.leaflet-container{font:inherit}
  aside{width:392px;max-width:42vw;border-left:1px solid var(--hair);background:var(--panel);display:flex;flex-direction:column;min-height:0}
  .aside-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--hair2)}
  .aside-head b{font-size:13px;font-weight:640}.aside-head .n{color:var(--muted);font-size:12px}
  .legend{display:flex;flex-direction:column;gap:5px;padding:9px 14px;border-bottom:1px solid var(--hair2)}
  .bar{height:9px;border-radius:5px;background:linear-gradient(90deg,var(--lo),var(--mid),var(--hi))}
  .leglabs{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
  .help{font-size:11.5px;line-height:1.45;color:var(--muted);padding:8px 14px 10px;border-bottom:1px solid var(--hair2)}
  .tablewrap{overflow:auto;min-height:0}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{position:sticky;top:0;background:var(--panel);z-index:1;text-align:left;padding:9px 12px;border-bottom:1px solid var(--hair);color:var(--muted);font-weight:600;cursor:pointer;white-space:nowrap;user-select:none}
  thead th.numcol{text-align:right}thead th .ar{opacity:.4;font-size:10px;margin-left:3px}
  thead th[aria-sort] .ar{opacity:1;color:var(--ink)}
  tbody td{padding:9px 12px;border-bottom:1px solid var(--hair2);vertical-align:top}
  tbody td.numcol{text-align:right}tbody tr{cursor:pointer}
  tbody tr:hover{background:#f4f7f5}tbody tr.active{background:#e8f1ed;box-shadow:inset 3px 0 0 var(--brand)}
  .skola{font-weight:560}.kom{color:var(--muted);font-size:12px}
  .val{display:inline-flex;align-items:center;gap:7px;justify-content:flex-end}
  .dot{width:10px;height:10px;border-radius:50%;flex:none;box-shadow:0 0 0 1px rgba(0,0,0,.08) inset}
  .pop b{display:block;font-size:14px;margin-bottom:2px}
  .pop .pk{color:var(--muted);font-size:12px;margin-bottom:8px}
  .pop table{font-size:12px;border-collapse:collapse;width:100%}
  .pop th,.pop td{padding:2px 6px;text-align:right;border-bottom:1px solid var(--hair2)}
  .pop th:first-child,.pop td:first-child{text-align:left}
  .pop thead th{color:var(--muted);font-weight:600;position:static}
  .pop tr.cur td{font-weight:680;color:var(--brand)}
  .empty{padding:26px 16px;color:var(--muted);font-size:13px;text-align:center}
  @media (max-width:820px){.main{flex-direction:column}#map{height:50vh;flex:none}aside{width:auto;max-width:none;border-left:0;border-top:1px solid var(--hair);flex:1 1 auto}.search input{width:140px}}
  @media (prefers-reduced-motion:reduce){*{scroll-behavior:auto!important}}
</style>
</head>

    all:'Alla',kommunal:'Kommunal',fristaende:'Fristående',allKommun:'Alla kommuner',allProg:'Alla program (snitt)',searchPh:'Sök skola…',
    unit:'skolor',colSchool:'Skola / placering',colKommun:'Kommun',colValue:'Värde',empty:'Inga skolor matchar.',
    metaTpl:(c,p,s)=>`${c} gymnasieskolor · senast <b>${p||'—'}</b> · källa ${s}`,pupils:n=>`${n} elever`,
    huvudLabel:{Kommunal:'Kommunal',['Fristående']:'Fristående'},
    metricNames:{admission:'Antagningspoäng (snitt)',exam3:'Examen inom 3 år %',gpa:'Betygspoäng (0–20)'},
    metricShort:{admission:['Antagn.','poäng'],exam3:['Examen','3 år'],gpa:['Betyg','poäng']},
    pop:{prog:'Program',adm:'Antagn.',gpa:'Betyg',exam:'Examen%',school:'Skolsnitt',schoolNote:'Per program; välj program för att se ett.'}},
  en:{title:'Sweden upper-secondary map',subtitle:'Gymnasium · source Skolverket',navGr:'Compulsory',navGy:'Upper sec.',
    sample:'⚠ <b>Sample data</b> (14 placeholders). Run <code>node fetch-data-gy.mjs</code> to build the real gy-data.json.',
    all:'All',kommunal:'Public',fristaende:'Independent',allKommun:'All municipalities',allProg:'All programs (avg)',searchPh:'Search school…',
    unit:'schools',colSchool:'School / rank',colKommun:'Municipality',colValue:'Value',empty:'No schools match.',
    metaTpl:(c,p,s)=>`${c} upper-secondary schools · latest <b>${p||'—'}</b> · source ${s}`,pupils:n=>`${n} pupils`,
    huvudLabel:{Kommunal:'Public',['Fristående']:'Independent'},
    metricNames:{admission:'Admission points (avg)',exam3:'Diploma within 3 yrs %',gpa:'Grade points (0–20)'},
    metricShort:{admission:['Admission','points'],exam3:['Diploma','3 yrs'],gpa:['Grade','points']},
    pop:{prog:'Program',adm:'Admis.',gpa:'Grade',exam:'Dipl.%',school:'School avg',schoolNote:'Per program; pick one above.'}},
};

const METRICS={admission:{field:'a',dom:[160,320],unit:'',dec:0},exam3:{field:'e',dom:[50,100],unit:'%',dec:0},gpa:{field:'g',dom:[10,18],unit:'',dec:1}};
const HELP={
  zh:{
    admission:'录取分 antagningspoäng：上一轮录取中、被该项目录取学生的初中绩点（默认显示平均分；弹窗里还有最低分）。它反映这个项目<b>有多难考进</b>，并不直接等于教学质量。',
    exam3:'三年毕业率%：入学后三年内拿到高中文凭(examen)的学生比例。',
    gpa:'毕业绩点 betygspoäng：毕业生各科成绩的平均分（0–20，A=20、E=10）。部分学校因毕业人数太少被屏蔽，显示为"—"。'
  },
  sv:{
    admission:'Antagningspoäng: meritvärdet bland antagna till programmet i senaste antagningen (snitt visas; lägsta finns i popupen). Visar <b>hur svårt det är att komma in</b> – inte skolans kvalitet.',
    exam3:'Examen inom 3 år %: andel som tagit gymnasieexamen inom tre år efter start.',
    gpa:'Betygspoäng: elevernas genomsnittliga betygspoäng (0–20, A=20, E=10). Kan saknas (\u2014) för små grupper.'
  },
  en:{
    admission:'Admission points: the year-9 merit value of pupils admitted to the program in the latest round (average shown; minimum is in the popup). Shows <b>how hard it is to get in</b> — not teaching quality.',
    exam3:'Diploma within 3 years %: share who obtained an upper-secondary diploma within three years of starting.',
    gpa:'Grade points: graduates\u2019 average grade points (0–20, A=20, E=10). May be missing (\u2014) for small groups.'
  }
};
const GPROG={
  zh:{avg:'当前为"所有项目"的<b>校加权平均</b>（按各项目人数加权）。在上方选具体项目，对比更准确。',one:'当前只看所选项目；同校不同项目差别可能很大。'},
  sv:{avg:'Visar nu ett <b>viktat skolsnitt</b> över alla program. Välj ett program ovan för rättvisare jämförelse.',one:'Visar nu valt program; program inom samma skola kan skilja sig mycket.'},
  en:{avg:'Showing a <b>weighted school average</b> across all programs. Pick a program above for a fairer comparison.',one:'Showing the selected program; programs within a school can differ a lot.'}
};

let lang='zh';
try{const s=localStorage.getItem('skolkarta_lang');if(s&&I18N[s])lang=s;else{const n=(navigator.language||'').slice(0,2);if(I18N[n])lang=n;}}catch(e){}
let state={metric:'admission',huvud:'',kommun:'',program:'',q:'',sort:'metric',dir:'desc'};
let DATA=[],META={},markers=new Map(),map,layer,active=null;
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

const SEQ=[[177,75,63],[231,193,94],[47,125,107]];
function color(metricKey,v){
  if(v==null||isNaN(v))return getCSS('--none');
  const [lo,hi]=METRICS[metricKey].dom;let t=Math.max(0,Math.min(1,(v-lo)/(hi-lo)));
  const seg=t<.5?0:1,lt=t<.5?t/.5:(t-.5)/.5;
  const c=SEQ[seg].map((x,i)=>Math.round(x+(SEQ[seg+1][i]-x)*lt));return `rgb(${c[0]},${c[1]},${c[2]})`;
}
const getCSS=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
function fmt(v,metricKey){if(v==null||isNaN(v))return '—';const M=METRICS[metricKey];return v.toFixed(M.dec)+M.unit;}

// value for a school under current program selection
function schoolValue(s,metricKey){
  const f=METRICS[metricKey].field;
  if(state.program){const p=s.programs.find(x=>x.c===state.program);return p?(p[f]??null):null;}
  let w=0,sum=0;
  for(const p of s.programs){const v=p[f];if(v==null)continue;const ww=p.n||1;w+=ww;sum+=v*ww;}
  if(!w)return null;const avg=sum/w;return metricKey==='gpa'?+avg.toFixed(1):Math.round(avg);
}
function offersProgram(s){return state.program?s.programs.some(p=>p.c===state.program):true;}

async function load(){
  let d=null;
  try{const r=await fetch('./gy-data.json',{cache:'no-store'});if(r.ok)d=await r.json();}catch(e){}
  if(!d||!d.schools||!d.schools.length)d=SAMPLE;
  DATA=d.schools;META=d;
  if(d.sample||(d.source&&/EXEMPEL/i.test(d.source)))$('#sampleFlag').classList.add('on');
  initMap();buildOptions();applyLang();render();
}
function initMap(){
  map=L.map('map',{preferCanvas:true}).setView([62,15],4);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap, © CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
  layer=L.layerGroup().addTo(map);
}
function buildOptions(){
  const ksel=$('#kommun'),koms=[...new Set(DATA.map(s=>s.kommun).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'sv'));
  for(const k of koms){const o=document.createElement('option');o.value=k;o.textContent=k;ksel.appendChild(o);}
  const codes=[...new Set(DATA.flatMap(s=>s.programs.map(p=>p.c)))].sort((a,b)=>a.localeCompare(b));
  const psel=$('#program');psel._codes=codes;
  for(const c of codes){const o=document.createElement('option');o.value=c;o.dataset.code=c;psel.appendChild(o);}
}
function applyLang(){
  const t=I18N[lang];document.documentElement.lang=lang;document.title=t.title;
  $('#h1').textContent=t.title;$('#subtitle').textContent=t.subtitle;
  $('#navGr').textContent=t.navGr;$('#navGy').textContent=t.navGy;
  $('#sampleFlag').innerHTML=t.sample;
  $$('#metricSeg [data-metric]').forEach(b=>{const[a,s]=t.metricShort[b.dataset.metric];b.innerHTML=`${a} <span class="sub">${s}</span>`;});
  $$('#huvudSeg [data-huvud]').forEach(b=>{b.textContent=b.dataset.huvud===''?t.all:(b.dataset.huvud==='Kommunal'?t.kommunal:t.fristaende);});
  $$('#langSeg [data-lang]').forEach(b=>b.setAttribute('aria-pressed',b.dataset.lang===lang));
  $('#kommun').options[0].textContent=t.allKommun;
  const psel=$('#program');psel.options[0].textContent=t.allProg;
  [...psel.options].slice(1).forEach(o=>{o.textContent=`${o.dataset.code} · ${progName(o.dataset.code,lang)}`;});
  $('#q').placeholder=t.searchPh;$('#shownUnit').textContent=t.unit;
  $('#thSchool').textContent=t.colSchool;$('#thKommun').textContent=t.colKommun;$('#thValue').textContent=t.colValue;
  $('#empty').textContent=t.empty;
  $('#meta').innerHTML=t.metaTpl(META.count||DATA.length,META.latestPeriod,(META.source||'').replace(/EXEMPEL.*/i,'sample'));
}
function filtered(){
  const q=state.q.trim().toLowerCase();
  return DATA.filter(s=>{
    if(state.huvud&&s.huvudman!==state.huvud)return false;
    if(state.kommun&&s.kommun!==state.kommun)return false;
    if(!offersProgram(s))return false;
    if(q&&!(`${s.namn} ${s.kommun} ${s.ort||''}`.toLowerCase().includes(q)))return false;
    return true;
  });
}
function sortRows(rows){
  const m=state.metric;
  const key=state.sort;
  const valOf=s=>key==='metric'?schoolValue(s,m):s[key];
  const isStr=key==='namn'||key==='kommun';
  const arr=rows.slice().sort((a,b)=>{
    let x=valOf(a),y=valOf(b);const xn=(x==null||x===''),yn=(y==null||y==='');
    if(xn&&yn)return 0;if(xn)return 1;if(yn)return -1;
    return isStr?String(x).localeCompare(String(y),'sv'):x-y;
  });
  if(state.dir==='desc')arr.reverse();
  if(!isStr){const has=[],no=[];arr.forEach(s=>{(valOf(s)==null?no:has).push(s);});return [...has,...no];}
  return arr;
}
function setLegend(){const M=METRICS[state.metric];$('#legLo').textContent=M.dom[0]+M.unit;$('#legHi').textContent=M.dom[1]+M.unit;const note=state.program?GPROG[lang].one:GPROG[lang].avg;$('#metricHelp').innerHTML=HELP[lang][state.metric]+'<br><span style="opacity:.85">'+note+'</span>';}
function render(){
  const m=state.metric,t=I18N[lang];
  $('#metricName').textContent=t.metricNames[m]+(state.program?` · ${state.program}`:'');
  setLegend();
  const rows=filtered();$('#shown').textContent=rows.length;
  layer.clearLayers();markers.clear();
  for(const s of rows.filter(s=>s.lat&&s.lng)){
    const v=schoolValue(s,m);
    const mk=L.circleMarker([s.lat,s.lng],{radius:6,color:'#fff',weight:1.1,fillColor:color(m,v),fillOpacity:.92}).bindPopup(popup(s),{maxWidth:300});
    mk.on('click',()=>setActive(s.kod,false));mk.addTo(layer);markers.set(s.kod,mk);
  }
  const sorted=sortRows(rows),rank=state.sort==='metric'&&state.dir==='desc';
  const tb=$('#tbody');tb.innerHTML='';
  sorted.forEach((s,i)=>{
    const v=schoolValue(s,m),tr=document.createElement('tr');tr.dataset.kod=s.kod;
    const tag=state.program?` · ${state.program}`:` · ${s.programs.length} ${lang==='zh'?'项目':lang==='sv'?'program':'progs'}`;
    tr.innerHTML=`<td><span class="skola">${rank?`<span class="kom">${i+1}.</span> `:''}${esc(s.namn)}</span>`+
      `<div class="kom">${s.huvudman?(t.huvudLabel[s.huvudman]||s.huvudman):''}${tag}</div></td>`+
      `<td class="kom">${esc(s.kommun||'—')}</td>`+
      `<td class="numcol"><span class="val tnum">${fmt(v,m)}<span class="dot" style="background:${color(m,v)}"></span></span></td>`;
    tr.addEventListener('click',()=>setActive(s.kod,true));tb.appendChild(tr);
  });
  $('#empty').hidden=sorted.length>0;
  if(active&&!markers.has(active))active=null;
  updateSortHeaders();
}
function popup(s){
  const t=I18N[lang].pop;
  const progs=s.programs.slice().sort((a,b)=>(b.a??-1)-(a.a??-1));
  let rows='';
  for(const p of progs){
    const cur=state.program&&p.c===state.program?' class="cur"':'';
    rows+=`<tr${cur}><td>${p.c} · ${progName(p.c,lang)}</td><td>${p.a??'—'}</td><td>${p.g!=null?p.g.toFixed(1):'—'}</td><td>${p.e!=null?p.e+'%':'—'}</td></tr>`;
  }
  return `<div class="pop"><b>${esc(s.namn)}</b><div class="pk">${esc(s.kommun||'')}${s.huvudman?' · '+(I18N[lang].huvudLabel[s.huvudman]||s.huvudman):''}${s.elever?' · '+I18N[lang].pupils(s.elever):''}</div>`+
    `<table><thead><tr><th>${t.prog}</th><th>${t.adm}</th><th>${t.gpa}</th><th>${t.exam}</th></tr></thead><tbody>${rows}</tbody></table>`+
    `<div class="kom" style="margin-top:6px">${t.schoolNote}</div></div>`;
}
function setActive(kod,fly){
  active=kod;
  $$('#tbody tr').forEach(tr=>{const on=tr.dataset.kod===kod;tr.classList.toggle('active',on);if(on)tr.scrollIntoView({block:'nearest'});});
  const mk=markers.get(kod);if(mk){if(fly)map.flyTo(mk.getLatLng(),Math.max(map.getZoom(),9),{duration:.6});mk.openPopup();}
}
function updateSortHeaders(){
  $$('thead th').forEach(th=>{
    if(th.dataset.sort===state.sort){th.setAttribute('aria-sort',state.dir==='asc'?'ascending':'descending');th.querySelector('.ar').textContent=state.dir==='asc'?'▲':'▼';}
    else{th.removeAttribute('aria-sort');th.querySelector('.ar').textContent='▲▼';}
  });
}
$$('#metricSeg [data-metric]').forEach(b=>b.onclick=()=>{state.metric=b.dataset.metric;$$('#metricSeg [data-metric]').forEach(x=>x.setAttribute('aria-pressed',x===b));render();});
$$('#huvudSeg [data-huvud]').forEach(b=>b.onclick=()=>{state.huvud=b.dataset.huvud;$$('#huvudSeg [data-huvud]').forEach(x=>x.setAttribute('aria-pressed',x===b));render();});
$$('#langSeg [data-lang]').forEach(b=>b.onclick=()=>{lang=b.dataset.lang;try{localStorage.setItem('skolkarta_lang',lang);}catch(e){}applyLang();render();});
$('#program').onchange=e=>{state.program=e.target.value;render();};
$('#kommun').onchange=e=>{state.kommun=e.target.value;render();const r=filtered().filter(s=>s.lat&&s.lng);if(state.kommun&&r.length)map.fitBounds(L.latLngBounds(r.map(s=>[s.lat,s.lng])).pad(.3));};
let qt;$('#q').oninput=e=>{clearTimeout(qt);qt=setTimeout(()=>{state.q=e.target.value;render();},120);};
$$('thead th').forEach(th=>th.onclick=()=>{const k=th.dataset.sort;if(state.sort===k)state.dir=state.dir==='asc'?'desc':'asc';else{state.sort=k;state.dir=(k==='namn'||k==='kommun')?'asc':'desc';}render();});
load();
</script>
</body>
</html>
