/* ---------- color ---------- */
const SEQ=[[177,75,63],[231,193,94],[47,125,107]];   // lo,mid,hi
const NEU=[236,233,223];
function color(metricKey,v){
  if(v==null||isNaN(v)) return getCSS('--none');
  const M=METRICS[metricKey];
  if(M.diverging){
    const D=M.dom[1]; let t=Math.max(-1,Math.min(1,v/D));
    const b=t<0?SEQ[0]:SEQ[2], k=Math.abs(t);
    const c=NEU.map((x,i)=>Math.round(x+(b[i]-x)*k));
    return `rgb(${c[0]},${c[1]},${c[2]})`;
  }
  const [lo,hi]=M.dom; let t=Math.max(0,Math.min(1,(v-lo)/(hi-lo)));
  const seg=t<.5?0:1, lt=t<.5?t/.5:(t-.5)/.5;
  const c=SEQ[seg].map((x,i)=>Math.round(x+(SEQ[seg+1][i]-x)*lt));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}
const getCSS=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
function fmt(v,metricKey){
  if(v==null||isNaN(v)) return '—';
  const M=METRICS[metricKey], s=v.toFixed(M.dec)+M.unit;
  return (M.diverging && v>0) ? '+'+s : s;
}

/* ---------- load ---------- */
async function load(){
  let d=null;
  try{ const r=await fetch('./data.json',{cache:'no-store'}); if(r.ok) d=await r.json(); }catch(e){}
  if(!d||!d.schools||!d.schools.length) d=SAMPLE;
  DATA=d.schools; META=d;
  const isSample=d.sample||(d.source&&/EXEMPEL/i.test(d.source));
  if(isSample) $('#sampleFlag').classList.add('on');
  initMap(); buildKommunOptions();
  applyLang(); render();
}
function initMap(){
  map=L.map('map',{preferCanvas:true}).setView([62.0,15.0],4);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    {attribution:'© OpenStreetMap, © CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
  layer=L.layerGroup().addTo(map);
}
function buildKommunOptions(){
  const sel=$('#kommun'), koms=[...new Set(DATA.map(s=>s.kommun).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'sv'));
  for(const k of koms){const o=document.createElement('option');o.value=k;o.textContent=k;sel.appendChild(o);}
}

/* ---------- language ---------- */
function applyLang(){
  const t=I18N[lang]; document.documentElement.lang=lang; document.title=t.title;
  $('#navGr').textContent={zh:'小学',sv:'Grundskola',en:'Compulsory'}[lang];
  $('#navGy').textContent={zh:'高中',sv:'Gymnasiet',en:'Upper sec.'}[lang];
  $('#h1').textContent=t.title; $('#subtitle').textContent=t.subtitle;
  $('#sampleFlag').innerHTML=t.sample;
  $$('#metricSeg [data-metric]').forEach(b=>{const[a,s]=t.metricShort[b.dataset.metric];b.innerHTML=`${a} <span class="sub">${s}</span>`;});
  $$('#huvudSeg [data-huvud]').forEach(b=>{b.textContent=b.dataset.huvud===''?t.all:(b.dataset.huvud==='Kommunal'?t.kommunal:t.fristaende);});
  $$('#langSeg [data-lang]').forEach(b=>b.setAttribute('aria-pressed',b.dataset.lang===lang));
  $('#kommun').options[0].textContent=t.allKommun;
  $('#q').placeholder=t.searchPh;
  $('#shownUnit').textContent=t.unit;
  $('#thSchool').textContent=t.colSchool; $('#thKommun').textContent=t.colKommun; $('#thValue').textContent=t.colValue;
  $('#empty').textContent=t.empty;
  $('#meta').innerHTML=t.metaTpl(META.count||DATA.length, META.latestPeriod, META.salsaPeriod,
    (META.source||'').replace(/EXEMPEL.*/i,'sample'));
}

/* ---------- filter + sort ---------- */
function filtered(){
  const q=state.q.trim().toLowerCase();
  return DATA.filter(s=>{
    if(state.huvud && s.huvudman!==state.huvud) return false;
    if(state.kommun && s.kommun!==state.kommun) return false;
    if(q && !(`${s.namn} ${s.kommun} ${s.ort||''}`.toLowerCase().includes(q))) return false;
    return true;
  });
}
function sortRows(rows){
  const key = state.sort==='metric' ? METRICS[state.metric].field : state.sort;
  const isStr = typeof (rows.find(r=>r[key]!=null)?.[key]) === 'string';
  const arr=rows.slice().sort((a,b)=>{
    let x=a[key], y=b[key]; const xn=(x==null||x===''), yn=(y==null||y==='');
    if(xn&&yn)return 0; if(xn)return 1; if(yn)return -1;
    return isStr ? String(x).localeCompare(String(y),'sv') : x-y;
  });
  if(state.dir==='desc') arr.reverse();
  if(!isStr){ const has=arr.filter(r=>r[key]!=null&&r[key]!==''), no=arr.filter(r=>r[key]==null||r[key]===''); return [...has,...no]; }
  return arr;
}

/* ---------- render ---------- */
function setLegend(){
  const m=state.metric, M=METRICS[m], t=I18N[lang];
  if(M.diverging){
    $('#bar').style.background='linear-gradient(90deg, rgb(177,75,63), rgb(236,233,223), rgb(47,125,107))';
    $('#legLo').textContent=M.dom[0]; $('#legMid').textContent='0'; $('#legHi').textContent='+'+M.dom[1];
    $('#legMid').style.display='';
  }else{
    $('#bar').style.background='linear-gradient(90deg,var(--lo),var(--mid),var(--hi))';
    $('#legLo').textContent=M.dom[0]+M.unit; $('#legHi').textContent=M.dom[1]+M.unit; $('#legMid').style.display='none';
  }
  const help=$('#metricHelp');
  help.innerHTML=HELP[lang][m]; help.style.display='block';
}
function render(){
  const m=state.metric, M=METRICS[m], f=M.field, t=I18N[lang];
  $('#metricName').textContent=t.metricNames[m];
  setLegend();
  const rows=filtered(); $('#shown').textContent=rows.length;

  layer.clearLayers(); markers.clear();
  for(const s of rows.filter(s=>s.lat&&s.lng)){
    const mk=L.circleMarker([s.lat,s.lng],{radius:6,color:'#fff',weight:1.1,fillColor:color(m,s[f]),fillOpacity:.92})
      .bindPopup(popup(s),{maxWidth:270});
    mk.on('click',()=>setActive(s.kod,false)); mk.addTo(layer); markers.set(s.kod,mk);
  }

  const sorted=sortRows(rows), rank=state.sort==='metric'&&state.dir==='desc';
  const tb=$('#tbody'); tb.innerHTML='';
  sorted.forEach((s,i)=>{
    const v=s[f], tr=document.createElement('tr'); tr.dataset.kod=s.kod;
    tr.innerHTML=
      `<td><span class="skola">${rank?`<span class="kom">${i+1}.</span> `:''}${esc(s.namn)}</span>`+
      `<div class="kom">${s.huvudman?(t.huvudLabel[s.huvudman]||s.huvudman):''}${s.elever?` · ${t.pupils(s.elever)}`:''}</div></td>`+
      `<td class="kom">${esc(s.kommun||'—')}</td>`+
      `<td class="numcol"><span class="val tnum">${fmt(v,m)}<span class="dot" style="background:${color(m,v)}"></span></span></td>`;
    tr.addEventListener('click',()=>setActive(s.kod,true)); tb.appendChild(tr);
  });
  $('#empty').hidden=sorted.length>0;
  if(active&&!markers.has(active)) active=null;
  updateSortHeaders();
}
function popup(s){
  const t=I18N[lang].pop, g=(l,v,k)=>`<span>${l}</span><span>${fmt(v,k)}</span>`;
  return `<div class="pop"><b>${esc(s.namn)}</b><div class="pk">${esc(s.kommun||'')}${s.huvudman?' · '+(I18N[lang].huvudLabel[s.huvudman]||s.huvudman):''}${s.period?' · '+s.period:''}</div><div class="grid">`+
    g(t.merit,s.meritvarde,'meritvarde')+g(t.beh,s.behorighet,'behorighet')+g(t.np,s.np,'np')+
    (s.npSve!=null?`<span>${t.sve}</span><span>${fmt(s.npSve,'np')}</span>`:'')+
    (s.npEng!=null?`<span>${t.eng}</span><span>${fmt(s.npEng,'np')}</span>`:'')+
    (s.npMa!=null?`<span>${t.ma}</span><span>${fmt(s.npMa,'np')}</span>`:'')+
    (s.salsaDev!=null?g(t.salsaDev,s.salsaDev,'salsa'):'')+
    (s.salsaActual!=null?`<span>${t.salsaActual}</span><span>${s.salsaActual}</span>`:'')+
    (s.salsaCalc!=null?`<span>${t.salsaCalc}</span><span>${s.salsaCalc}</span>`:'')+
    (s.andelGodkand!=null?`<span>${t.passed}</span><span>${fmt(s.andelGodkand,'behorighet')}</span>`:'')+
    (s.lararbehorighet!=null?`<span>${t.teacher}</span><span>${fmt(s.lararbehorighet,'behorighet')}</span>`:'')+
    `</div></div>`;
}
function setActive(kod,fly){
  active=kod;
  $$('#tbody tr').forEach(tr=>{const on=tr.dataset.kod===kod;tr.classList.toggle('active',on);if(on)tr.scrollIntoView({block:'nearest'});});
  const mk=markers.get(kod); if(mk){ if(fly)map.flyTo(mk.getLatLng(),Math.max(map.getZoom(),9),{duration:.6}); mk.openPopup(); }
}
function updateSortHeaders(){
  $$('thead th').forEach(th=>{
    if(th.dataset.sort===state.sort){th.setAttribute('aria-sort',state.dir==='asc'?'ascending':'descending');th.querySelector('.ar').textContent=state.dir==='asc'?'▲':'▼';}
    else{th.removeAttribute('aria-sort');th.querySelector('.ar').textContent='▲▼';}
  });
}

/* ---------- events ---------- */
$$('#metricSeg [data-metric]').forEach(b=>b.onclick=()=>{
  state.metric=b.dataset.metric;
  $$('#metricSeg [data-metric]').forEach(x=>x.setAttribute('aria-pressed',x===b));
  render();
});
$$('#huvudSeg [data-huvud]').forEach(b=>b.onclick=()=>{
  state.huvud=b.dataset.huvud;
  $$('#huvudSeg [data-huvud]').forEach(x=>x.setAttribute('aria-pressed',x===b));
  render();
});
$$('#langSeg [data-lang]').forEach(b=>b.onclick=()=>{
  lang=b.dataset.lang; try{localStorage.setItem('skolkarta_lang',lang);}catch(e){}
  applyLang(); render();
});
$('#kommun').onchange=e=>{
  state.kommun=e.target.value; render();
  const rows=filtered().filter(s=>s.lat&&s.lng);
  if(state.kommun&&rows.length) map.fitBounds(L.latLngBounds(rows.map(s=>[s.lat,s.lng])).pad(.3));
};
let qt; $('#q').oninput=e=>{clearTimeout(qt);qt=setTimeout(()=>{state.q=e.target.value;render();},120);};
$$('thead th').forEach(th=>th.onclick=()=>{
  const key=th.dataset.sort;
  if(state.sort===key) state.dir=state.dir==='asc'?'desc':'asc';
  else{state.sort=key; state.dir=(key==='namn'||key==='kommun')?'asc':'desc';}
  render();
});

load();
</script>
</body>
</html>
