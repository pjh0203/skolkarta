const SEQ=[[177,75,63],[231,193,94],[47,125,107]],NEU=[236,233,223];
function color(mk,v){if(v==null||isNaN(v))return getCSS('--none');const M=METRICS[mk];
  if(M.diverging){const D=M.dom[1];let t=Math.max(-1,Math.min(1,v/D));const b=t<0?SEQ[0]:SEQ[2],k=Math.abs(t);const c=NEU.map((x,i)=>Math.round(x+(b[i]-x)*k));return `rgb(${c[0]},${c[1]},${c[2]})`;}
  const[lo,hi]=M.dom;let t=Math.max(0,Math.min(1,(v-lo)/(hi-lo)));const seg=t<.5?0:1,lt=t<.5?t/.5:(t-.5)/.5;const c=SEQ[seg].map((x,i)=>Math.round(x+(SEQ[seg+1][i]-x)*lt));return `rgb(${c[0]},${c[1]},${c[2]})`;}
const getCSS=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
function fmt(v,mk){if(v==null||isNaN(v))return '—';const M=METRICS[mk],s=v.toFixed(M.dec)+M.unit;return (M.diverging&&v>0)?'+'+s:s;}

async function load(){
  let d=null;
  try{const r=await fetch('./data.json',{cache:'no-store'});if(r.ok)d=await r.json();}catch(e){}
  if(!d||!d.schools||!d.schools.length)d=SAMPLE;
  DATA=d.schools;META=d;
  if(d.sample||(d.source&&/EXEMPEL/i.test(d.source)))$('#sampleFlag').classList.add('on');
  initMap();buildKommunList();applyLang();render();setTimeout(()=>{map.invalidateSize();render();},150);
}
function initMap(){map=L.map('map',{preferCanvas:true}).setView([62,15],4);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap, © CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
  layer=L.layerGroup().addTo(map);}

let KOMS=[];
function buildKommunList(){KOMS=[...new Set(DATA.map(s=>s.kommun).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'sv'));renderMsList('');}
function renderMsList(filter){
  const f=filter.trim().toLowerCase();const list=$('#msList');list.innerHTML='';
  for(const k of KOMS){
    if(f&&!k.toLowerCase().includes(f))continue;
    const id='k_'+k.replace(/\W/g,'_');
    const lab=document.createElement('label');
    lab.innerHTML=`<input type="checkbox" ${state.kommuner.includes(k)?'checked':''}><span>${esc(k)}</span>`;
    lab.querySelector('input').onchange=e=>{
      if(e.target.checked){if(!state.kommuner.includes(k))state.kommuner.push(k);}
      else state.kommuner=state.kommuner.filter(x=>x!==k);
      syncKommun();
    };
    list.appendChild(lab);
  }
}
function syncKommun(){
  const t=I18N[lang],b=$('#msBadge');
  b.hidden=state.kommuner.length===0;b.textContent=state.kommuner.length;
  const chips=$('#chips');chips.innerHTML='';
  state.kommuner.forEach(k=>{
    const c=document.createElement('span');c.className='chip';
    c.innerHTML=`${esc(k)} <button aria-label="remove">×</button>`;
    c.querySelector('button').onclick=()=>{state.kommuner=state.kommuner.filter(x=>x!==k);renderMsList($('#msSearch').value);syncKommun();};
    chips.appendChild(c);
  });
  render();
  const rows=filtered().filter(s=>s.lat&&s.lng);
  if(state.kommuner.length&&rows.length)map.fitBounds(L.latLngBounds(rows.map(s=>[s.lat,s.lng])).pad(.3));
}

function applyLang(){
  const t=I18N[lang];document.documentElement.lang=lang;document.title=t.title;
  $('#navGr').textContent={zh:'小学',sv:'Grundskola',en:'Compulsory'}[lang];
  $('#navGy').textContent={zh:'高中',sv:'Gymnasiet',en:'Upper sec.'}[lang];
  $('#h1').textContent=t.title;$('#subtitle').textContent=t.subtitle;$('#sampleFlag').innerHTML=t.sample;
  $$('#metricSeg [data-metric]').forEach(b=>{const[a,s]=t.metricShort[b.dataset.metric];b.innerHTML=`${a} <span class="sub">${s}</span>`;});
  $$('#huvudSeg [data-huvud]').forEach(b=>{b.textContent=b.dataset.huvud===''?t.all:(b.dataset.huvud==='Kommunal'?t.kommunal:t.fristaende);});
  $$('#langSeg [data-lang]').forEach(b=>b.setAttribute('aria-pressed',b.dataset.lang===lang));
  $('#msBtnLabel').textContent=t.msLabel;$('#msSearch').placeholder=t.msSearchPh;$('#msClear').textContent=t.msClear;$('#msClose').textContent=t.msClose;
  $('#q').placeholder=t.searchPh;$('#shownUnit').textContent=t.unit;
  $('#thSchool').textContent=t.colSchool;$('#thKommun').textContent=t.colKommun;$('#thValue').textContent=t.colValue;
  $('#empty').textContent=t.empty;
  $('#tabRank').textContent=t.tabRank;$('#tabTrend').textContent=t.tabTrend;
  $('#rangeSeg [data-range]').forEach(b=>b.textContent=b.dataset.range==='all'?({zh:'全部',sv:'Alla',en:'All'}[lang]):b.dataset.range+(lang==='zh'?'年':lang==='sv'?' år':'y'));
  $('#meta').innerHTML=t.metaTpl(META.count||DATA.length,META.latestPeriod,META.salsaPeriod,(META.source||'').replace(/EXEMPEL.*/i,'sample'))+(META.generatedAt?' · '+({zh:'更新',sv:'uppdaterad',en:'updated'}[lang])+' '+META.generatedAt.slice(0,10):'');
}

function filtered(){
  const q=state.q.trim().toLowerCase();
  return DATA.filter(s=>{
    if(state.huvud&&s.huvudman!==state.huvud)return false;
    if(state.kommuner.length&&!state.kommuner.includes(s.kommun))return false;
    if(q&&!(`${s.namn} ${s.kommun} ${s.ort||''}`.toLowerCase().includes(q)))return false;
    return true;
  });
}
function sortRows(rows){
  const key=state.sort==='metric'?METRICS[state.metric].field:state.sort;
  const isStr=typeof(rows.find(r=>r[key]!=null)?.[key])==='string';
  const arr=rows.slice().sort((a,b)=>{let x=a[key],y=b[key];const xn=(x==null||x===''),yn=(y==null||y==='');if(xn&&yn)return 0;if(xn)return 1;if(yn)return -1;return isStr?String(x).localeCompare(String(y),'sv'):x-y;});
  if(state.dir==='desc')arr.reverse();
  if(!isStr){const has=arr.filter(r=>r[key]!=null&&r[key]!=='' ),no=arr.filter(r=>r[key]==null||r[key]==='');return [...has,...no];}
  return arr;
}
function setLegend(){const m=state.metric,M=METRICS[m];
  if(M.diverging){$('#bar').style.background='linear-gradient(90deg, rgb(177,75,63), rgb(236,233,223), rgb(47,125,107))';$('#legLo').textContent=M.dom[0];$('#legMid').textContent='0';$('#legHi').textContent='+'+M.dom[1];$('#legMid').style.display='';}
  else{$('#bar').style.background='linear-gradient(90deg,var(--lo),var(--mid),var(--hi))';$('#legLo').textContent=M.dom[0]+M.unit;$('#legHi').textContent=M.dom[1]+M.unit;$('#legMid').style.display='none';}
  $('#metricHelp').innerHTML=HELP[lang][m];}

function render(){
  const m=state.metric,M=METRICS[m],f=M.field,t=I18N[lang];
  $('#metricName').textContent=t.metricNames[m];setLegend();
  const rows=filtered();$('#shown').textContent=rows.length;
  layer.clearLayers();markers.clear();
  for(const s of rows.filter(s=>s.lat&&s.lng)){
    const mk=L.circleMarker([s.lat,s.lng],{radius:6,color:'#fff',weight:1.1,fillColor:color(m,s[f]),fillOpacity:.92}).bindPopup(popup(s),{maxWidth:270});
    mk.on('click',()=>setActive(s.kod,false));mk.addTo(layer);markers.set(s.kod,mk);
  }
  const sorted=sortRows(rows),rank=state.sort==='metric'&&state.dir==='desc';
  const tb=$('#tbody');tb.innerHTML='';
  sorted.forEach((s,i)=>{const v=s[f],tr=document.createElement('tr');tr.dataset.kod=s.kod;
    tr.innerHTML=`<td><span class="skola">${rank?`<span class="kom">${i+1}.</span> `:''}${esc(s.namn)}</span><div class="kom">${s.huvudman?(t.huvudLabel[s.huvudman]||s.huvudman):''}${s.elever?` · ${t.pupils(s.elever)}`:''}</div></td><td class="kom">${esc(s.kommun||'—')}</td><td class="numcol"><span class="val tnum">${fmt(v,m)}<span class="dot" style="background:${color(m,v)}"></span></span></td>`;
    tr.addEventListener('click',()=>setActive(s.kod,true));tb.appendChild(tr);});
  $('#empty').hidden=sorted.length>0;
  if(active&&!markers.has(active))active=null;
  updateSortHeaders();
  if(state.tab==='trend')renderTrend();
}
function popup(s){const t=I18N[lang].pop,g=(l,v,k)=>`<span>${l}</span><span>${fmt(v,k)}</span>`;
  return `<div class="pop"><b>${esc(s.namn)}</b><div class="pk">${esc(s.kommun||'')}${s.huvudman?' · '+(I18N[lang].huvudLabel[s.huvudman]||s.huvudman):''}${s.period?' · '+s.period:''}</div><div class="grid">`+
    g(t.merit,s.meritvarde,'meritvarde')+g(t.beh,s.behorighet,'behorighet')+g(t.np,s.np,'np')+
    (s.salsaDev!=null?g(t.salsaDev,s.salsaDev,'salsa'):'')+
    (s.andelGodkand!=null?`<span>${t.passed}</span><span>${fmt(s.andelGodkand,'behorighet')}</span>`:'')+
    (s.lararbehorighet!=null?`<span>${t.teacher}</span><span>${fmt(s.lararbehorighet,'behorighet')}</span>`:'')+`</div></div>`;}
function setActive(kod,fly){active=kod;
  $$('#tbody tr').forEach(tr=>{const on=tr.dataset.kod===kod;tr.classList.toggle('active',on);if(on)tr.scrollIntoView({block:'nearest'});});
  const mk=markers.get(kod);if(mk){if(fly)map.flyTo(mk.getLatLng(),Math.max(map.getZoom(),9),{duration:.6});mk.openPopup();}
  if(state.tab==='trend')renderTrend();}
function updateSortHeaders(){$$('thead th').forEach(th=>{if(th.dataset.sort===state.sort){th.setAttribute('aria-sort',state.dir==='asc'?'ascending':'descending');th.querySelector('.ar').textContent=state.dir==='asc'?'▲':'▼';}else{th.removeAttribute('aria-sort');th.querySelector('.ar').textContent='▲▼';}});}

/* ---------- TREND ---------- */
function allPeriods(metric){const set=new Set();for(const s of DATA){const ser=s.series&&s.series[metric];if(ser)for(const p in ser)set.add(p);}return [...set].sort();}
function avgSeries(schools,metric){const out={};const periods=allPeriods(metric);
  for(const p of periods){let n=0,sum=0;for(const s of schools){const v=s.series&&s.series[metric]&&s.series[metric][p];if(v!=null){n++;sum+=v;}}if(n)out[p]=sum/n;}return out;}
function lastN(periods,n){return periods.slice(Math.max(0,periods.length-n));}
function shortP(p){const a=p.split('/');return a.length===2?a[0].slice(2)+'/'+a[1]:p;}

function renderTrend(){
  const t=I18N[lang];let metric=state.metric;
  let salsaNote='';
  if(!TREND_METRICS[metric]){salsaNote=t.trSalsa;metric='meritvarde';}
  const M=METRICS[metric];
  const periodsAll=allPeriods(metric);const periods=state.range==='all'?periodsAll:lastN(periodsAll,state.range);
  const series=[];
  const activeSchool=active?DATA.find(s=>s.kod===active):null;
  let title;
  if(activeSchool){
    title=t.trTitleSchool;
    const ss=activeSchool.series&&activeSchool.series[metric]||{};
    series.push({label:activeSchool.namn,color:'#1b2230',width:2.4,pts:periods.map(p=>({p,v:ss[p]}))});
    const komAvg=avgSeries(DATA.filter(s=>s.kommun===activeSchool.kommun),metric);
    series.push({label:activeSchool.kommun+t.trKommunSuffix,color:'#2f6f5e',pts:periods.map(p=>({p,v:komAvg[p]}))});
  } else if(state.kommuner.length){
    title=t.trTitleKommun;
    state.kommuner.slice(0,6).forEach((k,i)=>{const a=avgSeries(DATA.filter(s=>s.kommun===k),metric);series.push({label:k,color:LINE_COLORS[i%LINE_COLORS.length],pts:periods.map(p=>({p,v:a[p]}))});});
  } else {
    title=t.trTitleNational;
  }
  const nat=avgSeries(DATA,metric);
  series.push({label:t.trNational,color:'#8a8f99',dash:true,pts:periods.map(p=>({p,v:nat[p]}))});
  $('#trendTitle').textContent=t.metricNames[metric].split(' (')[0]+' · '+title;
  drawTrend(periods,series,M);
  // legend
  $('#trendLegend').innerHTML=series.map(s=>`<span><i style="background:${s.color}${s.dash?';opacity:.7':''}"></i>${esc(s.label)}</span>`).join('');
  const hint=(!activeSchool&&!state.kommuner.length)?t.trHint:'';
  const maxhint=TRMAX[lang](periodsAll.length);
  $('#trendNote').textContent=[maxhint,salsaNote,hint].filter(Boolean).join(' · ');
}
function drawTrend(periods,series,M){
  const W=340,H=210,padL=36,padR=10,padT=12,padB=26;
  const xs=p=>padL+(periods.length<=1?0:(periods.indexOf(p)/(periods.length-1))*(W-padL-padR));
  let vals=[];series.forEach(s=>s.pts.forEach(pt=>{if(pt.v!=null)vals.push(pt.v);}));
  if(!vals.length){$('#trendChart').innerHTML=`<svg viewBox="0 0 ${W} ${H}"></svg>`;return;}
  let mn=Math.min(...vals),mx=Math.max(...vals);if(mn===mx){mn-=1;mx+=1;}const padv=(mx-mn)*0.12;mn-=padv;mx+=padv;
  const ys=v=>padT+(1-(v-mn)/(mx-mn))*(H-padT-padB);
  const dec=M.dec;
  let g='';
  // gridlines
  [0,.5,1].forEach(f=>{const v=mn+(mx-mn)*f,y=ys(v);g+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#eceae3"/><text x="${padL-5}" y="${y+3}" text-anchor="end" font-size="9" fill="#9aa0ab">${v.toFixed(dec)}</text>`;});
  // x labels
  const step=periods.length>6?2:1;
  periods.forEach((p,i)=>{if(i%step===0||i===periods.length-1)g+=`<text x="${xs(p)}" y="${H-9}" text-anchor="middle" font-size="9" fill="#9aa0ab">${shortP(p)}</text>`;});
  // lines
  for(const s of series){
    const segs=[];let cur=[];
    s.pts.forEach(pt=>{if(pt.v==null){if(cur.length)segs.push(cur);cur=[];}else cur.push(`${xs(pt.p).toFixed(1)},${ys(pt.v).toFixed(1)}`);});
    if(cur.length)segs.push(cur);
    segs.forEach(c=>{g+=`<polyline points="${c.join(' ')}" fill="none" stroke="${s.color}" stroke-width="${s.width||1.8}" ${s.dash?'stroke-dasharray="4 3" opacity=".8"':''} stroke-linejoin="round" stroke-linecap="round"/>`;});
    s.pts.forEach(pt=>{if(pt.v!=null)g+=`<circle cx="${xs(pt.p).toFixed(1)}" cy="${ys(pt.v).toFixed(1)}" r="${s.width?3:2.3}" fill="${s.color}"><title>${esc(s.label)} ${shortP(pt.p)}: ${pt.v.toFixed(dec)}</title></circle>`;});
  }
  $('#trendChart').innerHTML=`<svg viewBox="0 0 ${W} ${H}" role="img">${g}</svg>`;
}
function setTab(tab){state.tab=tab;
  $('#tabRank').setAttribute('aria-selected',tab==='rank');$('#tabTrend').setAttribute('aria-selected',tab==='trend');
  $('#rankView').hidden=tab!=='rank';$('#trendView').hidden=tab!=='trend';
  if(tab==='trend')renderTrend();}

/* ---------- events ---------- */
$$('#metricSeg [data-metric]').forEach(b=>b.onclick=()=>{state.metric=b.dataset.metric;$$('#metricSeg [data-metric]').forEach(x=>x.setAttribute('aria-pressed',x===b));if(state.sort!=='namn'&&state.sort!=='kommun')state.sort='metric';render();});
$$('#huvudSeg [data-huvud]').forEach(b=>b.onclick=()=>{state.huvud=b.dataset.huvud;$$('#huvudSeg [data-huvud]').forEach(x=>x.setAttribute('aria-pressed',x===b));render();});
$$('#langSeg [data-lang]').forEach(b=>b.onclick=()=>{lang=b.dataset.lang;try{localStorage.setItem('skolkarta_lang',lang);}catch(e){}applyLang();renderMsList($('#msSearch').value);syncKommun();});
$('#msBtn').onclick=()=>$('#msPanel').classList.toggle('on');
$('#msClose').onclick=()=>$('#msPanel').classList.remove('on');
$('#msClear').onclick=()=>{state.kommuner=[];renderMsList($('#msSearch').value);syncKommun();};
$('#msSearch').oninput=e=>renderMsList(e.target.value);
document.addEventListener('click',e=>{if(!$('#ms').contains(e.target))$('#msPanel').classList.remove('on');});
let qt;$('#q').oninput=e=>{clearTimeout(qt);qt=setTimeout(()=>{state.q=e.target.value;render();},120);};
$$('thead th').forEach(th=>th.onclick=()=>{const k=th.dataset.sort;if(state.sort===k)state.dir=state.dir==='asc'?'desc':'asc';else{state.sort=k;state.dir=(k==='namn'||k==='kommun')?'asc':'desc';}render();});
$('#tabRank').onclick=()=>setTab('rank');$('#tabTrend').onclick=()=>setTab('trend');
$$('#rangeSeg [data-range]').forEach(b=>b.onclick=()=>{state.range=b.dataset.range==='all'?'all':+b.dataset.range;$$('#rangeSeg [data-range]').forEach(x=>x.setAttribute('aria-pressed',x===b));renderTrend();});

load();
</script>
