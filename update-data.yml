name: Update school data

on:
  schedule:
    - cron: '0 4 1 12 *'      # 每年 12 月 1 日 04:00 UTC 自动跑
  workflow_dispatch: {}         # 也可在 Actions 页手动触发

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch latest data from Skolverket
        run: node fetch-data.mjs
      - name: Commit data.json if it changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- data.json; then
            git add data.json
            git commit -m "chore: refresh data.json ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No changes in data.json."
          fi
