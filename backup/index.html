// ---- color encoding (low->mid->high, green=high=better) ----
const STOPS = [[177,75,63],[231,193,94],[47,125,107]]; // --lo,--mid,--hi
function lerp(a,b,t){return a+(b-a)*t}
function color(metric,v){
  if(v==null||isNaN(v)) return getCSS('--none');
  const [lo,hi]=METRICS[metric].dom;
  let t=(v-lo)/(hi-lo); t=Math.max(0,Math.min(1,t));
  const seg=t<.5?0:1, lt=t<.5?t/.5:(t-.5)/.5;
  const c=STOPS[seg].map((x,i)=>Math.round(lerp(x,STOPS[seg+1][i],lt)));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}
function getCSS(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim()}
function fmt(v,m){if(v==null||isNaN(v))return '—';const M=METRICS[m];return v.toFixed(M.dec)+M.unit}

    if(r.ok) d=await r.json();
  }catch(e){}
  if(!d||!d.schools||!d.schools.length){ d=SAMPLE; }
  DATA=d.schools;
  const isSample = d.sample || d.source && /EXEMPEL/i.test(d.source);
  if(isSample) document.getElementById('sampleFlag').classList.add('on');
  document.getElementById('meta').innerHTML =
    `${d.count||DATA.length} 所学校 · 最新学年 <b>${d.latestPeriod||'—'}</b> · 来源：${(d.source||'').replace(/EXEMPEL.*/,'示例数据')}`;
  initMap();
  buildKommunOptions();
  render();
}

function initMap(){
  map=L.map('map',{preferCanvas:true,zoomControl:true}).setView([62.0,15.0],4);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
    attribution:'© OpenStreetMap, © CARTO',subdomains:'abcd',maxZoom:19
  }).addTo(map);
  layer=L.layerGroup().addTo(map);
}

function buildKommunOptions(){
  const sel=document.getElementById('kommun');
  const koms=[...new Set(DATA.map(s=>s.kommun).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'sv'));
  for(const k of koms){const o=document.createElement('option');o.value=k;o.textContent=k;sel.appendChild(o);}
}

// ---- filter + sort ----
function filtered(){
  const q=state.q.trim().toLowerCase();
  return DATA.filter(s=>{
    if(state.huvud && s.huvudman!==state.huvud) return false;
    if(state.kommun && s.kommun!==state.kommun) return false;
    if(q && !(`${s.namn} ${s.kommun} ${s.ort||''}`.toLowerCase().includes(q))) return false;
    return true;
  });
}
function sortRows(rows){
  const {sort,dir,metric}=state, k=sort==='metric'?metric:sort;
  const s=rows.slice().sort((a,b)=>{
    let x=a[k], y=b[k];
    const xn=(x==null||x===''), yn=(y==null||y==='');
    if(xn&&yn)return 0; if(xn)return 1; if(yn)return -1;     // 缺失值永远沉底
    if(typeof x==='string') return x.localeCompare(y,'sv');
    return x-y;
  });
  if(dir==='desc') s.reverse();
  // 缺失值在 reverse 后仍应沉底：重排
  if(sort==='metric'||typeof rows[0]?.[k]!=='string'){
    const has=s.filter(r=>r[k]!=null&&r[k]!==''), no=s.filter(r=>r[k]==null||r[k]==='');
    return [...has,...no];
  }
  return s;
}

// ---- render ----
function render(){
  const m=state.metric, M=METRICS[m];
  document.getElementById('metricName').textContent=M.name;
  document.getElementById('legLo').textContent=M.dom[0]+M.unit;
  document.getElementById('legHi').textContent=M.dom[1]+M.unit;

  const rows=filtered();
  document.getElementById('shown').textContent=rows.length;

  // markers
  layer.clearLayers(); markers.clear();
  const withGeo=rows.filter(s=>s.lat&&s.lng);
  for(const s of withGeo){
    const v=s[m];
    const mk=L.circleMarker([s.lat,s.lng],{
      radius:6, color:'#ffffff', weight:1.1, fillColor:color(m,v), fillOpacity:.92
    }).bindPopup(popup(s),{maxWidth:260});
    mk.on('click',()=>setActive(s.kod,false));
    mk.addTo(layer); markers.set(s.kod,mk);
  }

  // table
  const sorted=sortRows(rows);
  const tb=document.getElementById('tbody'); tb.innerHTML='';
  const rankByMetric = state.sort==='metric' && state.dir==='desc';
  sorted.forEach((s,i)=>{
    const v=s[m];
    const tr=document.createElement('tr'); tr.dataset.kod=s.kod;
    tr.innerHTML=
      `<td><span class="skola">${rankByMetric?`<span class="kom">${i+1}.</span> `:''}${esc(s.namn)}</span>`+
      `<div class="kom">${s.huvudman?(HUVUD_LABEL[s.huvudman]||s.huvudman):''}${s.elever?` · ${s.elever} 生`:''}</div></td>`+
      `<td class="kom">${esc(s.kommun||'—')}</td>`+
      `<td class="numcol"><span class="val tnum">${fmt(v,m)}<span class="dot" style="background:${color(m,v)}"></span></span></td>`;
    tr.addEventListener('click',()=>setActive(s.kod,true));
    tb.appendChild(tr);
  });
  document.getElementById('empty').hidden = sorted.length>0;
  if(active && !markers.has(active)) active=null;
  updateSortHeaders();
}

function popup(s){
  const g=(label,v,m)=>`<span>${label}</span><span>${fmt(v,m)}</span>`;
  return `<div class="pop"><b>${esc(s.namn)}</b><div class="pk">${esc(s.kommun||'')}${s.huvudman?' · '+(HUVUD_LABEL[s.huvudman]||s.huvudman):''}${s.period?' · '+s.period:''}</div>`+
    `<div class="grid">`+
    g('平均绩点 meritvärde',s.meritvarde,'meritvarde')+
    g('升学资格 behörig%',s.behorighet,'behorighet')+
    g('全国统考 NP 均分',s.np,'np')+
    (s.npSve!=null?`<span>· 瑞典语 SVE</span><span>${fmt(s.npSve,'np')}</span>`:'')+
    (s.npEng!=null?`<span>· 英语 ENG</span><span>${fmt(s.npEng,'np')}</span>`:'')+
    (s.npMa!=null?`<span>· 数学 MA</span><span>${fmt(s.npMa,'np')}</span>`:'')+
    (s.andelGodkand!=null?`<span>全科及格%</span><span>${fmt(s.andelGodkand,'behorighet')}</span>`:'')+
    (s.lararbehorighet!=null?`<span>教师资格%</span><span>${fmt(s.lararbehorighet,'behorighet')}</span>`:'')+
    `</div></div>`;
}

function setActive(kod,fly){
  active=kod;
  document.querySelectorAll('#tbody tr').forEach(tr=>{
    const on=tr.dataset.kod===kod; tr.classList.toggle('active',on);
    if(on) tr.scrollIntoView({block:'nearest'});
  });
  const mk=markers.get(kod);
  if(mk){ if(fly) map.flyTo(mk.getLatLng(),Math.max(map.getZoom(),9),{duration:.6}); mk.openPopup(); }
}

function updateSortHeaders(){
  document.querySelectorAll('thead th').forEach(th=>{
    const key=th.dataset.sort;
    if(key===state.sort){th.setAttribute('aria-sort',state.dir==='asc'?'ascending':'descending');
      th.querySelector('.ar').textContent=state.dir==='asc'?'▲':'▼';}
    else{th.removeAttribute('aria-sort');th.querySelector('.ar').textContent='▲▼';}
  });
}

const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// ---- events ----
document.querySelectorAll('.seg [data-metric]').forEach(b=>b.onclick=()=>{
  state.metric=b.dataset.metric;
  document.querySelectorAll('.seg [data-metric]').forEach(x=>x.setAttribute('aria-pressed',x===b));
  if(state.sort!=='namn'&&state.sort!=='kommun') state.sort='metric';
  render();
});
document.querySelectorAll('.seg [data-huvud]').forEach(b=>b.onclick=()=>{
  state.huvud=b.dataset.huvud;
  document.querySelectorAll('.seg [data-huvud]').forEach(x=>x.setAttribute('aria-pressed',x===b));
  render();
});
document.getElementById('kommun').onchange=e=>{
  state.kommun=e.target.value; render();
  const rows=filtered().filter(s=>s.lat&&s.lng);
  if(state.kommun&&rows.length){const b=L.latLngBounds(rows.map(s=>[s.lat,s.lng]));map.fitBounds(b.pad(.3));}
};
let qt; document.getElementById('q').oninput=e=>{clearTimeout(qt);qt=setTimeout(()=>{state.q=e.target.value;render();},120)};
document.querySelectorAll('thead th').forEach(th=>th.onclick=()=>{
  const key=th.dataset.sort;
  if(state.sort===key) state.dir=state.dir==='asc'?'desc':'asc';
  else {state.sort=key; state.dir = key==='namn'||key==='kommun' ? 'asc':'desc';}
  render();
});

load();
</script>
</body>
</html>
